<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Expense Tracker</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  font-family: Arial;
  background: #111;
  color: white;
  padding: 20px;
}
input, select, button {
  padding: 8px;
  margin: 5px;
}
.card {
  background: #1c1c1c;
  padding: 15px;
  margin-bottom: 15px;
  border-radius: 8px;
}
</style>
</head>

<body>

<h2>💸 Expense Tracker</h2>

<div class="card">
  <input id="title" placeholder="Title"/>
  <input id="amount" type="number" placeholder="Amount"/>
  <select id="category"></select>
  <button onclick="addExpense()">Add</button>
</div>

<div class="card">
  <h3>Expenses</h3>
  <div id="list"></div>
</div>

<script>
const BASE_URL = "http://localhost:3000"; // 🔴 CHANGE if deployed

/* =========================
   INIT
========================= */
async function init() {
  try {
    await fetch(`${BASE_URL}/init`);

    await loadCategories();
    await loadExpenses();

  } catch (e) {
    console.error(e);
    alert("App failed to start");
  }
}

/* =========================
   SAFE FETCH
========================= */
async function safeFetch(url, options = {}) {
  try {
    const res = await fetch(url, options);
    let data;

    try {
      data = await res.json();
    } catch {
      throw new Error("Invalid JSON response");
    }

    if (!res.ok) {
      throw new Error(data.error || (data.errors && data.errors.join(", ")) || "Error");
    }

    return data;

  } catch (err) {
    alert(err.message);
    throw err;
  }
}

/* =========================
   LOAD CATEGORIES
========================= */
async function loadCategories() {
  const data = await safeFetch(`${BASE_URL}/categories`);

  const sel = document.getElementById("category");
  sel.innerHTML = "";

  data.forEach(c => {
    const opt = document.createElement("option");
    opt.value = c.name;
    opt.textContent = c.name;
    sel.appendChild(opt);
  });
}

/* =========================
   LOAD EXPENSES
========================= */
async function loadExpenses() {
  const data = await safeFetch(`${BASE_URL}/expenses`);

  const list = document.getElementById("list");
  list.innerHTML = "";

  data.data.forEach(e => {
    const div = document.createElement("div");
    div.style.marginBottom = "8px";

    div.innerHTML = `
      ${e.title} - ₹${e.amount} (${e.category})
      <button onclick="deleteExpense(${e.id})">❌</button>
    `;

    list.appendChild(div);
  });
}

/* =========================
   ADD EXPENSE
========================= */
async function addExpense() {
  const title = document.getElementById("title").value.trim();
  const amount = document.getElementById("amount").value;
  const category = document.getElementById("category").value;

  if (!title || !amount) {
    alert("Enter title & amount");
    return;
  }

  await safeFetch(`${BASE_URL}/add-expense`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      title,
      amount: Number(amount),
      category
    })
  });

  document.getElementById("title").value = "";
  document.getElementById("amount").value = "";

  loadExpenses();
}

/* =========================
   DELETE
========================= */
async function deleteExpense(id) {
  if (!confirm("Delete?")) return;

  await safeFetch(`${BASE_URL}/delete-expense/${id}`, {
    method: "DELETE"
  });

  loadExpenses();
}

init();
</script>

</body>
</html>
