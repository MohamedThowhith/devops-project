<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Expense Tracker</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0f14;
      --surface: #161920;
      --surface2: #1e2229;
      --border: #2a2f3a;
      --accent: #e8ff4d;
      --accent2: #4dffb4;
      --danger: #ff4d6d;
      --text: #eef0f5;
      --muted: #6b7280;
      --radius: 12px;
      --font: 'Syne', sans-serif;
      --mono: 'DM Mono', monospace;
    }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0;
    }

    /* ── Header ── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 18px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .logo { font-size: 1.3rem; font-weight: 800; letter-spacing: -0.5px; }
    .logo span { color: var(--accent); }
    .header-actions { display: flex; gap: 10px; align-items: center; }

    /* ── Layout ── */
    .container { max-width: 1280px; margin: 0 auto; padding: 28px 24px; }

    /* ── Stats Row ── */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 14px;
      margin-bottom: 28px;
    }
    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      transition: border-color .2s;
    }
    .stat-card:hover { border-color: var(--accent); }
    .stat-label { font-size: .72rem; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
    .stat-value { font-size: 1.6rem; font-weight: 700; font-family: var(--mono); }
    .stat-value.green { color: var(--accent2); }
    .stat-value.yellow { color: var(--accent); }
    .stat-value.red { color: var(--danger); }

    /* ── Two-col layout ── */
    .main-grid {
      display: grid;
      grid-template-columns: 360px 1fr;
      gap: 20px;
      align-items: start;
    }
    @media (max-width: 900px) { .main-grid { grid-template-columns: 1fr; } }

    /* ── Card ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 22px;
      margin-bottom: 20px;
    }
    .card-title {
      font-size: .78rem;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--muted);
      margin-bottom: 16px;
      font-weight: 600;
    }

    /* ── Form ── */
    .form-group { margin-bottom: 12px; }
    label { display: block; font-size: .78rem; color: var(--muted); margin-bottom: 5px; letter-spacing: .5px; }
    input, select, textarea {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: var(--font);
      font-size: .9rem;
      padding: 10px 13px;
      outline: none;
      transition: border-color .2s;
    }
    input:focus, select:focus, textarea:focus { border-color: var(--accent); }
    textarea { resize: vertical; min-height: 64px; }
    select option { background: var(--surface2); }

    /* ── Buttons ── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 10px 18px;
      border-radius: 8px;
      font-family: var(--font);
      font-size: .88rem;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: opacity .15s, transform .1s;
    }
    .btn:active { transform: scale(.97); }
    .btn-primary { background: var(--accent); color: #0d0f14; }
    .btn-primary:hover { opacity: .88; }
    .btn-ghost {
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--border);
    }
    .btn-ghost:hover { color: var(--text); border-color: var(--text); }
    .btn-danger { background: var(--danger); color: #fff; }
    .btn-danger:hover { opacity: .85; }
    .btn-sm { padding: 6px 11px; font-size: .78rem; border-radius: 6px; }
    .btn-full { width: 100%; justify-content: center; }

    /* ── Tabs ── */
    .tabs { display: flex; gap: 4px; margin-bottom: 18px; background: var(--surface2); border-radius: 8px; padding: 4px; }
    .tab {
      flex: 1;
      text-align: center;
      padding: 8px;
      border-radius: 6px;
      font-size: .82rem;
      font-weight: 600;
      cursor: pointer;
      color: var(--muted);
      transition: all .2s;
    }
    .tab.active { background: var(--surface); color: var(--accent); }

    /* ── Filter row ── */
    .filter-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: flex-end;
      margin-bottom: 16px;
    }
    .filter-row .form-group { margin: 0; flex: 1; min-width: 130px; }
    .filter-row input, .filter-row select { padding: 9px 11px; }

    /* ── Expense List ── */
    #expense-list { display: flex; flex-direction: column; gap: 10px; }
    .expense-item {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      transition: border-color .2s;
      animation: fadeIn .25s ease;
    }
    @keyframes fadeIn { from { opacity:0; transform: translateY(6px); } to { opacity:1; transform: none; } }
    .expense-item:hover { border-color: var(--border); background: #1a1f28; }
    .expense-check input[type=checkbox] { accent-color: var(--accent); width: 16px; height: 16px; cursor: pointer; }
    .expense-cat-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .expense-info { flex: 1; min-width: 0; }
    .expense-title { font-weight: 600; font-size: .92rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .expense-meta { font-size: .74rem; color: var(--muted); margin-top: 2px; }
    .expense-note { font-size: .74rem; color: var(--muted); font-style: italic; margin-top: 2px; }
    .expense-amount { font-family: var(--mono); font-size: 1rem; font-weight: 500; color: var(--accent); white-space: nowrap; }
    .expense-actions { display: flex; gap: 6px; }

    /* ── Category badge ── */
    .cat-badge {
      display: inline-block;
      padding: 2px 9px;
      border-radius: 20px;
      font-size: .7rem;
      font-weight: 600;
      color: #0d0f14;
    }

    /* ── Pagination ── */
    .pagination { display: flex; align-items: center; justify-content: center; gap: 8px; margin-top: 18px; flex-wrap: wrap; }
    .page-btn {
      padding: 7px 14px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 7px;
      color: var(--text);
      font-size: .82rem;
      cursor: pointer;
      font-family: var(--font);
      transition: all .15s;
    }
    .page-btn:hover { border-color: var(--accent); color: var(--accent); }
    .page-btn.active { background: var(--accent); color: #0d0f14; border-color: var(--accent); font-weight: 700; }
    .page-btn:disabled { opacity: .3; cursor: default; }
    .page-info { font-size: .8rem; color: var(--muted); font-family: var(--mono); }

    /* ── Charts ── */
    .chart-tabs { display: flex; gap: 6px; margin-bottom: 16px; }
    .chart-tab {
      padding: 6px 14px;
      border-radius: 6px;
      font-size: .78rem;
      font-weight: 600;
      cursor: pointer;
      color: var(--muted);
      border: 1px solid var(--border);
      background: transparent;
      font-family: var(--font);
      transition: all .2s;
    }
    .chart-tab.active { background: var(--accent); color: #0d0f14; border-color: var(--accent); }
    .chart-wrap { position: relative; height: 240px; }

    /* ── Modal ── */
    .modal-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,.7);
      backdrop-filter: blur(4px);
      z-index: 200;
      align-items: center;
      justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 28px;
      width: 100%;
      max-width: 440px;
      animation: slideUp .2s ease;
    }
    @keyframes slideUp { from { transform: translateY(20px); opacity:0; } to { transform: none; opacity:1; } }
    .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    .modal-title { font-size: 1.1rem; font-weight: 700; }
    .modal-close { background: none; border: none; color: var(--muted); font-size: 1.3rem; cursor: pointer; line-height: 1; }
    .modal-close:hover { color: var(--text); }
    .modal-footer { display: flex; gap: 10px; margin-top: 20px; justify-content: flex-end; }

    /* ── Toast ── */
    #toast-container { position: fixed; bottom: 24px; right: 24px; z-index: 999; display: flex; flex-direction: column; gap: 8px; }
    .toast {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-left: 3px solid var(--accent);
      border-radius: 10px;
      padding: 12px 18px;
      font-size: .85rem;
      max-width: 300px;
      animation: toastIn .25s ease;
      transition: opacity .3s;
    }
    .toast.error { border-left-color: var(--danger); }
    @keyframes toastIn { from { transform: translateX(20px); opacity:0; } to { transform:none; opacity:1; } }

    /* ── Bulk bar ── */
    #bulk-bar {
      display: none;
      background: var(--surface2);
      border: 1px solid var(--accent);
      border-radius: 10px;
      padding: 12px 16px;
      margin-bottom: 14px;
      align-items: center;
      gap: 12px;
    }
    #bulk-bar.visible { display: flex; }
    .bulk-count { font-size: .85rem; font-family: var(--mono); flex: 1; }

    /* ── Empty state ── */
    .empty { text-align: center; padding: 48px 20px; color: var(--muted); }
    .empty-icon { font-size: 2.5rem; margin-bottom: 12px; }
    .empty p { font-size: .9rem; }

    /* ── Category manager ── */
    .cat-list { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
    .cat-chip {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 5px 10px;
      border-radius: 20px;
      font-size: .78rem;
      font-weight: 600;
      color: #0d0f14;
      cursor: default;
    }
    .cat-chip .del-cat { background: none; border: none; cursor: pointer; color: #0d0f14; opacity: .6; font-size: .9rem; line-height:1; }
    .cat-chip .del-cat:hover { opacity: 1; }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    /* ── Loader ── */
    .spinner {
      width: 18px; height: 18px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .6s linear infinite;
      display: inline-block;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Sort/search row ── */
    .search-sort { display: flex; gap: 8px; margin-bottom: 14px; }
    .search-sort input { flex: 1; }
    .search-sort select { width: auto; flex-shrink: 0; }
  </style>
</head>
<body>

<!-- Header -->
<header>
  <div class="logo">💸 <span>Xpense</span>Tracker</div>
  <div class="header-actions">
    <button class="btn btn-ghost btn-sm" onclick="exportCSV()">⬇ Export CSV</button>
    <button class="btn btn-ghost btn-sm" onclick="openCatModal()">🏷 Categories</button>
    <button class="btn btn-primary btn-sm" onclick="openAddModal()">+ Add Expense</button>
  </div>
</header>

<div class="container">

  <!-- Stats -->
  <div class="stats-grid" id="stats-grid">
    <div class="stat-card"><div class="stat-label">Total Spent</div><div class="stat-value yellow" id="stat-total">—</div></div>
    <div class="stat-card"><div class="stat-label">Transactions</div><div class="stat-value" id="stat-count">—</div></div>
    <div class="stat-card"><div class="stat-label">Average</div><div class="stat-value green" id="stat-avg">—</div></div>
    <div class="stat-card"><div class="stat-label">Highest</div><div class="stat-value red" id="stat-max">—</div></div>
    <div class="stat-card"><div class="stat-label">Lowest</div><div class="stat-value green" id="stat-min">—</div></div>
  </div>

  <div class="main-grid">

    <!-- LEFT: Charts -->
    <div>
      <div class="card">
        <div class="card-title">Analytics</div>
        <div class="chart-tabs">
          <button class="chart-tab active" onclick="switchChart('daily', this)">Daily</button>
          <button class="chart-tab" onclick="switchChart('monthly', this)">Monthly</button>
          <button class="chart-tab" onclick="switchChart('category', this)">By Category</button>
        </div>
        <div class="chart-wrap"><canvas id="mainChart"></canvas></div>
      </div>

      <!-- Date Filter -->
      <div class="card">
        <div class="card-title">Filter by Date</div>
        <div class="filter-row">
          <div class="form-group"><label>From</label><input type="date" id="filter-start"/></div>
          <div class="form-group"><label>To</label><input type="date" id="filter-end"/></div>
        </div>
        <div style="display:flex;gap:8px">
          <button class="btn btn-primary btn-sm" onclick="filterByDate()">Apply Filter</button>
          <button class="btn btn-ghost btn-sm" onclick="clearFilter()">Clear</button>
        </div>
        <div id="filter-results" style="margin-top:14px"></div>
      </div>
    </div>

    <!-- RIGHT: Expense List -->
    <div>
      <div class="card">
        <div class="card-title">Expenses</div>

        <!-- Search & Sort -->
        <div class="search-sort">
          <input id="search-input" placeholder="🔍 Search title or note…" oninput="debounceSearch()" />
          <select id="cat-filter" onchange="loadExpenses(1)">
            <option value="">All Categories</option>
          </select>
          <select id="sort-select" onchange="loadExpenses(1)">
            <option value="id">Newest</option>
            <option value="amount">Amount</option>
            <option value="title">Title</option>
          </select>
        </div>

        <!-- Bulk delete bar -->
        <div id="bulk-bar">
          <span class="bulk-count"><span id="selected-count">0</span> selected</span>
          <button class="btn btn-danger btn-sm" onclick="bulkDelete()">🗑 Delete Selected</button>
          <button class="btn btn-ghost btn-sm" onclick="clearSelection()">✕ Cancel</button>
        </div>

        <div id="expense-list"></div>
        <div id="pagination"></div>
      </div>
    </div>

  </div>
</div>

<!-- ── Add / Edit Modal ── -->
<div class="modal-overlay" id="expense-modal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modal-title">Add Expense</div>
      <button class="modal-close" onclick="closeModal('expense-modal')">✕</button>
    </div>
    <div class="form-group"><label>Title *</label><input id="m-title" placeholder="e.g. Grocery shopping"/></div>
    <div class="form-group"><label>Amount (₹) *</label><input id="m-amount" type="number" min="0.01" step="0.01" placeholder="0.00"/></div>
    <div class="form-group"><label>Category</label>
      <select id="m-category"></select>
    </div>
    <div class="form-group"><label>Note</label><textarea id="m-note" placeholder="Optional note…"></textarea></div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('expense-modal')">Cancel</button>
      <button class="btn btn-primary" id="modal-save-btn" onclick="saveExpense()">Save</button>
    </div>
  </div>
</div>

<!-- ── Category Modal ── -->
<div class="modal-overlay" id="cat-modal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">Manage Categories</div>
      <button class="modal-close" onclick="closeModal('cat-modal')">✕</button>
    </div>
    <div style="display:flex;gap:8px;margin-bottom:14px">
      <input id="new-cat-name" placeholder="Category name" style="flex:1"/>
      <input id="new-cat-color" type="color" value="#6366f1" style="width:44px;padding:4px;cursor:pointer"/>
      <button class="btn btn-primary btn-sm" onclick="addCategory()">Add</button>
    </div>
    <div class="cat-list" id="cat-list"></div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('cat-modal')">Close</button>
    </div>
  </div>
</div>

<!-- ── Toast container ── -->
<div id="toast-container"></div>

<script id="r4m4x0">

const BASE_URL = "https://devops-project-nvdd.onrender.com";

let token = localStorage.getItem("token");
let currentUser = localStorage.getItem("user");

let mainChart = null;
let currentPage = 1;
let currentChartType = "daily";
let editingId = null;
let categories = [];
let selectedIds = new Set();
let searchTimer = null;
let isFiltered = false;

/* ───────────────── AUTH SCREEN ───────────────── */

if (!token) {
  document.body.innerHTML = `
    <div style="
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      background:#0d0f14;
      color:white;
      font-family:sans-serif;
    ">
      <div style="
        width:100%;
        max-width:400px;
        background:#161920;
        padding:30px;
        border-radius:16px;
      ">
        <h2 style="margin-bottom:20px">💸 Expense Tracker</h2>

        <input id="auth-name"
          placeholder="Name"
          style="width:100%;padding:12px;margin-bottom:10px;background:#1e2229;border:none;color:white;border-radius:8px"
        />

        <input id="auth-email"
          placeholder="Email"
          type="email"
          style="width:100%;padding:12px;margin-bottom:10px;background:#1e2229;border:none;color:white;border-radius:8px"
        />

        <input id="auth-password"
          placeholder="Password"
          type="password"
          style="width:100%;padding:12px;margin-bottom:16px;background:#1e2229;border:none;color:white;border-radius:8px"
        />

        <div style="display:flex;gap:10px">
          <button onclick="register()" style="
            flex:1;
            padding:12px;
            border:none;
            border-radius:8px;
            background:#e8ff4d;
            font-weight:bold;
            cursor:pointer;
          ">Register</button>

          <button onclick="login()" style="
            flex:1;
            padding:12px;
            border:none;
            border-radius:8px;
            background:#4dffb4;
            font-weight:bold;
            cursor:pointer;
          ">Login</button>
        </div>

        <p id="auth-msg" style="margin-top:15px;color:#ff4d6d"></p>
      </div>
    </div>
  `;
}

/* ───────────────── API ───────────────── */

async function api(url, options = {}) {

  options.headers = {
    "Content-Type": "application/json",
    ...(options.headers || {})
  };

  if (token) {
    options.headers.Authorization = `Bearer ${token}`;
  }

  const res = await fetch(BASE_URL + url, options);

  if (res.status === 401) {
    logout();
    throw new Error("Unauthorized");
  }

  return res;
}

/* ───────────────── AUTH ───────────────── */

async function register() {

  const name = document.getElementById("auth-name").value.trim();
  const email = document.getElementById("auth-email").value.trim();
  const password = document.getElementById("auth-password").value.trim();

  try {

    const res = await fetch(`${BASE_URL}/register`, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        name,
        email,
        password
      })
    });

    const data = await res.json();

    if (!res.ok) {
      document.getElementById("auth-msg").textContent = data.error;
      return;
    }

    localStorage.setItem("token", data.token);
    localStorage.setItem("user", JSON.stringify(data.user));

    location.reload();

  } catch {
    document.getElementById("auth-msg").textContent = "Network error";
  }
}

async function login() {

  const email = document.getElementById("auth-email").value.trim();
  const password = document.getElementById("auth-password").value.trim();

  try {

    const res = await fetch(`${BASE_URL}/login`, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        email,
        password
      })
    });

    const data = await res.json();

    if (!res.ok) {
      document.getElementById("auth-msg").textContent = data.error;
      return;
    }

    localStorage.setItem("token", data.token);
    localStorage.setItem("user", JSON.stringify(data.user));

    location.reload();

  } catch {
    document.getElementById("auth-msg").textContent = "Network error";
  }
}

function logout() {
  localStorage.removeItem("token");
  localStorage.removeItem("user");
  location.reload();
}

/* ───────────────── HEADER USER ───────────────── */

if (token) {

  const user = JSON.parse(currentUser || "{}");

  const header = document.querySelector(".header-actions");

  header.innerHTML += `
    <span style="
      color:#e8ff4d;
      margin-right:10px;
      font-size:.9rem;
    ">
      👋 ${user.name || "User"}
    </span>

    <button class="btn btn-danger btn-sm" onclick="logout()">
      Logout
    </button>
  `;
}

/* ───────────────── INIT ───────────────── */

async function init() {

  if (!token) return;

  try {

    await Promise.all([
      loadCategories(),
      loadSummary()
    ]);

    await loadExpenses(1);
    await loadChart("daily");

  } catch (err) {
    console.error(err);
  }
}

/* ───────────────── TOAST ───────────────── */

function toast(msg, type = "success") {

  const el = document.createElement("div");

  el.className = "toast" + (type === "error" ? " error" : "");
  el.textContent = msg;

  document.getElementById("toast-container").appendChild(el);

  setTimeout(() => {
    el.style.opacity = "0";
    setTimeout(() => el.remove(), 300);
  }, 3000);
}

/* ───────────────── FORMAT ───────────────── */

function fmt(n) {
  return Number(n || 0).toLocaleString("en-IN", {
    minimumFractionDigits: 2,
    maximumFractionDigits: 2
  });
}

function escHtml(s) {
  return String(s || "")
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;");
}

/* ───────────────── SUMMARY ───────────────── */

async function loadSummary() {

  const res = await api("/summary");
  const d = await res.json();

  document.getElementById("stat-total").textContent = "₹" + fmt(d.total);
  document.getElementById("stat-count").textContent = d.count;
  document.getElementById("stat-avg").textContent = "₹" + fmt(d.average);
  document.getElementById("stat-max").textContent = "₹" + fmt(d.max);
  document.getElementById("stat-min").textContent = "₹" + fmt(d.min);
}

/* ───────────────── CATEGORIES ───────────────── */

async function loadCategories() {

  const res = await api("/categories");
  categories = await res.json();

  populateCategorySelects();
  renderCatList();
}

function getCatColor(name) {

  const cat = categories.find(c => c.name === name);
  return cat ? cat.color : "#6366f1";
}

function populateCategorySelects() {

  ["m-category", "cat-filter"].forEach(id => {

    const sel = document.getElementById(id);

    if (!sel) return;

    const oldValue = sel.value;

    const isFilter = id === "cat-filter";

    sel.innerHTML = isFilter
      ? `<option value="">All Categories</option>`
      : "";

    categories.forEach(c => {
      sel.innerHTML += `
        <option value="${c.name}">
          ${c.name}
        </option>
      `;
    });

    sel.value = oldValue;
  });
}

function renderCatList() {

  const el = document.getElementById("cat-list");

  if (!el) return;

  el.innerHTML = categories.map(c => `
    <span class="cat-chip" style="background:${c.color}">
      ${c.name}
      <button class="del-cat"
        onclick="deleteCategory(${c.id})">
        ✕
      </button>
    </span>
  `).join("");
}

/* ───────────────── ADD CATEGORY ───────────────── */

async function addCategory() {

  const name = document.getElementById("new-cat-name").value.trim();
  const color = document.getElementById("new-cat-color").value;

  const res = await api("/categories", {
    method: "POST",
    body: JSON.stringify({
      name,
      color
    })
  });

  const d = await res.json();

  if (!res.ok) {
    toast(d.error, "error");
    return;
  }

  document.getElementById("new-cat-name").value = "";

  await loadCategories();

  toast("Category added");
}

/* ───────────────── DELETE CATEGORY ───────────────── */

async function deleteCategory(id) {

  await api(`/categories/${id}`, {
    method: "DELETE"
  });

  await loadCategories();

  toast("Deleted");
}

/* ───────────────── LOAD EXPENSES ───────────────── */

async function loadExpenses(page = 1) {

  currentPage = page;

  const search =
    document.getElementById("search-input").value;

  const category =
    document.getElementById("cat-filter").value;

  const sort =
    document.getElementById("sort-select").value;

  const params = new URLSearchParams({
    page,
    limit: 15,
    sort
  });

  if (search) params.set("search", search);
  if (category) params.set("category", category);

  const res = await api(`/expenses?${params}`);

  const d = await res.json();

  renderExpenses(d.data);
  renderPagination(d.pagination);
}

/* ───────────────── RENDER ───────────────── */

function renderExpenses(data) {

  const list = document.getElementById("expense-list");

  if (!data.length) {
    list.innerHTML = `
      <div class="empty">
        No expenses
      </div>
    `;
    return;
  }

  list.innerHTML = data.map(exp => `

    <div class="expense-item">

      <div class="expense-info">
        <div class="expense-title">
          ${escHtml(exp.title)}
        </div>

        <div class="expense-meta">
          ${exp.category}
        </div>
      </div>

      <div class="expense-amount">
        ₹${fmt(exp.amount)}
      </div>

      <div class="expense-actions">

        <button class="btn btn-ghost btn-sm"
          onclick="openEditModal(${exp.id})">
          ✏
        </button>

        <button class="btn btn-danger btn-sm"
          onclick="deleteExpense(${exp.id})">
          🗑
        </button>

      </div>

    </div>

  `).join("");
}

/* ───────────────── PAGINATION ───────────────── */

function renderPagination(p) {

  const el = document.getElementById("pagination");

  if (p.totalPages <= 1) {
    el.innerHTML = "";
    return;
  }

  let html = `<div class="pagination">`;

  for (let i = 1; i <= p.totalPages; i++) {
    html += `
      <button
        class="page-btn ${i === p.page ? "active" : ""}"
        onclick="loadExpenses(${i})">
        ${i}
      </button>
    `;
  }

  html += `</div>`;

  el.innerHTML = html;
}

/* ───────────────── SAVE ───────────────── */

async function saveExpense() {

  const title =
    document.getElementById("m-title").value.trim();

  const amount =
    document.getElementById("m-amount").value;

  const category =
    document.getElementById("m-category").value;

  const note =
    document.getElementById("m-note").value.trim();

  const url = editingId
    ? `/update-expense/${editingId}`
    : `/add-expense`;

  const method = editingId ? "PUT" : "POST";

  const res = await api(url, {
    method,
    body: JSON.stringify({
      title,
      amount,
      category,
      note
    })
  });

  const d = await res.json();

  if (!res.ok) {
    toast(d.error, "error");
    return;
  }

  closeModal("expense-modal");

  toast(editingId ? "Updated" : "Added");

  await refreshAll();
}

/* ───────────────── DELETE ───────────────── */

async function deleteExpense(id) {

  if (!confirm("Delete expense?")) return;

  await api(`/delete-expense/${id}`, {
    method: "DELETE"
  });

  toast("Deleted");

  await refreshAll();
}

/* ───────────────── SINGLE ───────────────── */

async function openEditModal(id) {

  const res = await api(`/expenses/${id}`);

  const exp = await res.json();

  editingId = id;

  document.getElementById("m-title").value = exp.title;
  document.getElementById("m-amount").value = exp.amount;
  document.getElementById("m-category").value = exp.category;
  document.getElementById("m-note").value = exp.note || "";

  openModal("expense-modal");
}

/* ───────────────── REFRESH ───────────────── */

async function refreshAll() {

  await Promise.all([
    loadSummary(),
    loadExpenses(currentPage),
    loadChart(currentChartType)
  ]);
}

/* ───────────────── MODALS ───────────────── */

function openModal(id) {
  document.getElementById(id).classList.add("open");
}

function closeModal(id) {
  document.getElementById(id).classList.remove("open");
}

function openAddModal() {

  editingId = null;

  document.getElementById("m-title").value = "";
  document.getElementById("m-amount").value = "";
  document.getElementById("m-note").value = "";

  openModal("expense-modal");
}

/* ───────────────── CHARTS ───────────────── */

async function loadChart(type) {

  currentChartType = type;

  let endpoint = "/chart-data";

  if (type === "monthly") {
    endpoint = "/chart-data/monthly";
  }

  if (type === "category") {
    endpoint = "/chart-data/category";
  }

  const res = await api(endpoint);

  const data = await res.json();

  if (mainChart) {
    mainChart.destroy();
  }

  const ctx =
    document.getElementById("mainChart");

  if (type === "category") {

    mainChart = new Chart(ctx, {
      type: "doughnut",
      data: {
        labels: data.map(x => x.category),
        datasets: [{
          data: data.map(x => Number(x.total))
        }]
      }
    });

    return;
  }

  mainChart = new Chart(ctx, {
    type: "bar",
    data: {
      labels: data.map(x => x.date || x.month),
      datasets: [{
        data: data.map(x => Number(x.total))
      }]
    }
  });
}

/* ───────────────── SWITCH CHART ───────────────── */

function switchChart(type, btn) {

  document.querySelectorAll(".chart-tab")
    .forEach(x => x.classList.remove("active"));

  btn.classList.add("active");

  loadChart(type);
}

/* ───────────────── EXPORT ───────────────── */

function exportCSV() {
  window.open(`${BASE_URL}/export/csv`);
}

/* ───────────────── SEARCH ───────────────── */

function debounceSearch() {

  clearTimeout(searchTimer);

  searchTimer = setTimeout(() => {
    loadExpenses(1);
  }, 400);
}

/* ───────────────── START ───────────────── */

if (token) {
  init();
}
