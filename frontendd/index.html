<!DOCTYPE html>
<html>
<head>
    <title>Expense Tracker</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<h1>💰 Expense Tracker</h1>

<!-- Add Expense -->
<input id="title" placeholder="Title">
<input id="amount" type="number" placeholder="Amount">
<button onclick="addExpense()">Add</button>

<h2>Total: ₹<span id="total">0</span></h2>

<!-- Filter -->
<h3>Filter by Date</h3>
<input type="date" id="start">
<input type="date" id="end">
<button onclick="filterExpenses()">Filter</button>

<!-- Expense List -->
<h2>Expenses</h2>
<ul id="list"></ul>

<!-- Chart -->
<h2>📊 Expense Chart</h2>
<canvas id="chart" width="400" height="200"></canvas>

<script>
const BASE_URL = "https://devops-project-nvdd.onrender.com";

let chart;

// ➕ Add Expense
async function addExpense() {
    const title = document.getElementById("title").value;
    const amount = document.getElementById("amount").value;

    await fetch(BASE_URL + "/add-expense", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ title, amount })
    });

    loadExpenses();
}

// 📋 Load Expenses
async function loadExpenses() {
    const res = await fetch(BASE_URL + "/expenses");
    const data = await res.json();

    const list = document.getElementById("list");
    list.innerHTML = "";

    data.forEach(exp => {
        const li = document.createElement("li");

        li.innerHTML = `
            ${exp.title} - ₹${exp.amount}
            <button onclick="deleteExpense(${exp.id})">Delete</button>
            <button onclick="editExpense(${exp.id}, '${exp.title}', ${exp.amount})">Edit</button>
        `;

        list.appendChild(li);
    });

    loadTotal();
    loadChart();
}

// ❌ Delete
async function deleteExpense(id) {
    await fetch(BASE_URL + "/delete-expense/" + id, {
        method: "DELETE"
    });
    loadExpenses();
}

// ✏️ Edit
async function editExpense(id, oldTitle, oldAmount) {
    const title = prompt("Edit title:", oldTitle);
    const amount = prompt("Edit amount:", oldAmount);

    await fetch(BASE_URL + "/update-expense/" + id, {
        method: "PUT",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ title, amount })
    });

    loadExpenses();
}

// 💰 Total
async function loadTotal() {
    const res = await fetch(BASE_URL + "/total");
    const data = await res.json();

    document.getElementById("total").innerText = data.total;
}

// 📅 Filter
async function filterExpenses() {
    const start = document.getElementById("start").value;
    const end = document.getElementById("end").value;

    const res = await fetch(
        `${BASE_URL}/expenses-by-date?start=${start}&end=${end}`
    );

    const data = await res.json();

    const list = document.getElementById("list");
    list.innerHTML = "";

    data.forEach(exp => {
        const li = document.createElement("li");
        li.innerText = `${exp.title} - ₹${exp.amount}`;
        list.appendChild(li);
    });
}

// 📊 Chart
async function loadChart() {
    const res = await fetch(BASE_URL + "/chart-data");
    const data = await res.json();

    const labels = data.map(d => d.date);
    const values = data.map(d => d.total);

    if (chart) chart.destroy();

    const ctx = document.getElementById("chart");

    chart = new Chart(ctx, {
        type: "bar",
        data: {
            labels: labels,
            datasets: [{
                label: "Expenses",
                data: values
            }]
        }
    });
}

// Load everything
loadExpenses();

</script>

</body>
</html>
