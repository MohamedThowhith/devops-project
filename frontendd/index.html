<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>GitHub Deployment Tracker</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;600&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#07090f;--surface:#0d111c;--surface2:#121827;--border:#1e2a3a;
      --accent:#f97316;--blue:#3b82f6;--green:#22c55e;--red:#ef4444;--yellow:#eab308;
      --purple:#a855f7;--text:#e2e8f0;--muted:#4b6280;--font:'IBM Plex Mono',monospace;
    }
    html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font);overflow-x:hidden}
    body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 50% at 50% -20%,rgba(249,115,22,.07),transparent);pointer-events:none;z-index:0}
    ::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}

    /* SETUP SCREEN */
    #setupScreen{position:fixed;inset:0;z-index:100;display:flex;align-items:center;justify-content:center;background:var(--bg)}
    .setup-box{width:100%;max-width:480px;padding:40px;background:var(--surface);border:1px solid var(--border);border-radius:16px;animation:fadeUp .5s ease both}
    .setup-logo{display:flex;align-items:center;gap:10px;margin-bottom:8px}
    .setup-logo-icon{width:40px;height:40px;border-radius:10px;background:linear-gradient(135deg,var(--accent),#c2410c);display:flex;align-items:center;justify-content:center;font-size:20px}
    .setup-logo-text{font-size:1.1rem;font-weight:600;color:#fff}
    .setup-sub{font-size:.72rem;color:var(--muted);margin-bottom:28px}
    .setup-step{display:flex;align-items:flex-start;gap:10px;padding:12px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;margin-bottom:10px;font-size:.7rem;color:var(--muted);line-height:1.6}
    .setup-step-num{width:20px;height:20px;border-radius:50%;background:var(--accent);color:#fff;font-size:.62rem;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
    .setup-step a{color:var(--accent);text-decoration:none}
    .setup-step a:hover{text-decoration:underline}
    .field{margin-bottom:16px}
    .field label{display:block;font-size:.65rem;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:6px}
    .field input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:var(--font);font-size:.8rem;padding:10px 14px;outline:none;transition:border-color .2s}
    .field input:focus{border-color:rgba(249,115,22,.5)}
    .field .hint{font-size:.62rem;color:var(--muted);margin-top:5px}
    .btn-primary{width:100%;padding:12px;background:var(--accent);border:none;border-radius:8px;color:#fff;font-family:var(--font);font-size:.8rem;font-weight:600;cursor:pointer;transition:opacity .2s,transform .15s;letter-spacing:.5px}
    .btn-primary:hover{opacity:.9;transform:translateY(-1px)}
    .btn-primary:disabled{opacity:.5;cursor:not-allowed;transform:none}
    .setup-error{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);color:var(--red);font-size:.72rem;padding:10px 14px;border-radius:8px;margin-bottom:14px;display:none}

    /* APP */
    #app{display:none;height:100vh;flex-direction:column}
    .topbar{display:flex;align-items:center;gap:16px;padding:0 24px;height:56px;background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:10;flex-shrink:0}
    .topbar-logo{display:flex;align-items:center;gap:9px}
    .topbar-logo-icon{width:30px;height:30px;border-radius:7px;background:linear-gradient(135deg,var(--accent),#c2410c);display:flex;align-items:center;justify-content:center;font-size:15px}
    .topbar-logo-text{font-size:.9rem;font-weight:600;color:#fff}
    .topbar-nav{display:flex;gap:4px;margin-left:24px}
    .nav-btn{padding:6px 14px;border:none;background:transparent;color:var(--muted);font-family:var(--font);font-size:.72rem;cursor:pointer;border-radius:6px;transition:all .2s;letter-spacing:.3px}
    .nav-btn:hover{color:var(--text);background:var(--surface2)}
    .nav-btn.active{color:var(--accent);background:rgba(249,115,22,.1)}
    .topbar-right{margin-left:auto;display:flex;align-items:center;gap:12px}
    .user-chip{display:flex;align-items:center;gap:8px;padding:5px 12px 5px 5px;background:var(--surface2);border:1px solid var(--border);border-radius:999px;font-size:.72rem;color:var(--text)}
    .user-avatar{width:24px;height:24px;border-radius:50%;overflow:hidden;background:var(--surface2)}
    .user-avatar img{width:100%;height:100%;object-fit:cover}
    .logout-btn{padding:6px 12px;border:1px solid var(--border);background:transparent;color:var(--muted);font-family:var(--font);font-size:.65rem;border-radius:6px;cursor:pointer;transition:all .2s}
    .logout-btn:hover{border-color:var(--red);color:var(--red)}
    .refresh-btn{padding:6px 12px;border:1px solid var(--border);background:transparent;color:var(--muted);font-family:var(--font);font-size:.65rem;border-radius:6px;cursor:pointer;transition:all .2s}
    .refresh-btn:hover{border-color:var(--green);color:var(--green)}

    .main{flex:1;overflow-y:auto;padding:28px 24px}
    .page{display:none}.page.active{display:block}
    .section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px}
    .section-title{font-size:1.1rem;font-weight:600;color:#fff}
    .section-sub{font-size:.7rem;color:var(--muted);margin-top:2px}

    /* METRICS */
    .metrics-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:28px}
    .metric-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px;position:relative;overflow:hidden;transition:border-color .2s}
    .metric-card:hover{border-color:rgba(249,115,22,.3)}
    .metric-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px}
    .metric-card.total::before{background:var(--blue)}.metric-card.success::before{background:var(--green)}
    .metric-card.failed::before{background:var(--red)}.metric-card.rate::before{background:var(--accent)}
    .metric-label{font-size:.62rem;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:10px}
    .metric-value{font-size:2rem;font-weight:600;color:#fff;line-height:1}
    .metric-sub{font-size:.65rem;color:var(--muted);margin-top:6px}
    .metric-icon{position:absolute;right:16px;top:16px;font-size:1.4rem;opacity:.4}

    /* GITHUB INFO BANNER */
    .github-banner{display:flex;align-items:center;gap:12px;padding:14px 18px;background:var(--surface);border:1px solid var(--border);border-radius:10px;margin-bottom:24px}
    .github-banner-avatar{width:36px;height:36px;border-radius:50%;overflow:hidden;flex-shrink:0}
    .github-banner-avatar img{width:100%;height:100%}
    .github-banner-info{flex:1}
    .github-banner-name{font-size:.85rem;color:#fff;font-weight:600}
    .github-banner-meta{font-size:.65rem;color:var(--muted);margin-top:2px}
    .github-banner-stats{display:flex;gap:16px;margin-left:auto}
    .github-stat{text-align:center}
    .github-stat-val{font-size:1rem;font-weight:600;color:#fff}
    .github-stat-label{font-size:.58rem;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}

    /* REPO SEARCH */
    .repo-search-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:24px}
    .repo-search-title{font-size:.75rem;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:14px}
    .repo-search-row{display:grid;grid-template-columns:1fr auto auto;gap:10px;align-items:end}
    .form-field label{display:block;font-size:.62rem;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:6px}
    .form-field input,.form-field select{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:var(--font);font-size:.78rem;padding:9px 12px;outline:none;transition:border-color .2s}
    .form-field select option{background:var(--surface2)}
    .form-field input:focus,.form-field select:focus{border-color:rgba(249,115,22,.5)}
    .search-btn{padding:9px 18px;background:var(--accent);border:none;border-radius:8px;color:#fff;font-family:var(--font);font-size:.75rem;font-weight:600;cursor:pointer;transition:opacity .2s;white-space:nowrap}
    .search-btn:hover{opacity:.9}
    .search-btn:disabled{opacity:.5;cursor:not-allowed}

    /* REPO SUGGESTIONS */
    .repo-suggestions{margin-top:14px;display:none}
    .repo-suggestion-label{font-size:.62rem;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
    .repo-chips{display:flex;flex-wrap:wrap;gap:8px}
    .repo-chip{padding:5px 12px;background:var(--surface2);border:1px solid var(--border);border-radius:6px;font-size:.68rem;color:var(--text);cursor:pointer;transition:all .15s}
    .repo-chip:hover{border-color:var(--accent);color:var(--accent)}

    /* TABLE */
    .table-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:24px}
    .table-header{display:grid;grid-template-columns:2fr 1fr 1fr 1fr 1fr;padding:10px 20px;background:var(--surface2);border-bottom:1px solid var(--border)}
    .th{font-size:.6rem;color:var(--muted);text-transform:uppercase;letter-spacing:1px}
    .table-row{display:grid;grid-template-columns:2fr 1fr 1fr 1fr 1fr;padding:14px 20px;border-bottom:1px solid var(--border);transition:background .15s;align-items:center}
    .table-row:last-child{border-bottom:none}.table-row:hover{background:var(--surface2)}
    .td{font-size:.75rem;color:var(--text)}.td.name{color:#fff;font-weight:600}.td.muted{color:var(--muted)}

    .status-badge{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:999px;font-size:.62rem;font-weight:600}
    .status-badge .dot{width:6px;height:6px;border-radius:50%}
    .status-badge.success{background:rgba(34,197,94,.1);color:var(--green)}.status-badge.success .dot{background:var(--green)}
    .status-badge.failure,.status-badge.error{background:rgba(239,68,68,.1);color:var(--red)}.status-badge.failure .dot,.status-badge.error .dot{background:var(--red)}
    .status-badge.pending,.status-badge.queued,.status-badge.in_progress{background:rgba(234,179,8,.1);color:var(--yellow)}

// ─── WORKFLOW RUNS ────────────────────────────────────────────────────────────
async function loadWorkflowRuns() {
  const listEl     = document.getElementById('runsList');
  const dashRunsEl = document.getElementById('dashRunsList');
  listEl.innerHTML = '<div class="loading"><div class="spinner"></div>Loading workflow runs...</div>';
  dashRunsEl.innerHTML = '<div class="loading"><div class="spinner"></div>Loading...</div>';

  try {
    // Fetch runs from the user's repos (top 5 repos by update)
    const topRepos = allRepos.slice(0, 8);
    const runPromises = topRepos.map(r =>
      ghFetch(`/repos/${GH_USER}/${r.name}/actions/runs?per_page=5`)
        .then(data => data.workflow_runs.map(run => ({ ...run, repoName: r.name })))
        .catch(() => [])
    );
    const results = await Promise.all(runPromises);
    allRuns = results.flat().sort((a,b) => new Date(b.created_at) - new Date(a.created_at));

    // Update metrics
    const success = allRuns.filter(r => r.conclusion === 'success').length;
    const failed  = allRuns.filter(r => r.conclusion === 'failure').length;
    const rate    = (success + failed) > 0 ? Math.round(success / (success + failed) * 100) + '%' : '—';
    document.getElementById('metricSuccess').textContent = success;
    document.getElementById('metricFailed').textContent  = failed;
    document.getElementById('metricRate').textContent    = rate;

    renderRunsList(allRuns, listEl);
    renderRunsList(allRuns.slice(0, 8), dashRunsEl);
  } catch(e) {
    listEl.innerHTML = `<div class="empty-state"><div class="empty-icon">⚠️</div>${e.message}</div>`;
    showToast('Error loading runs: ' + e.message, 'error');
  }
}

function renderRunsList(runs, container) {
  if (!runs.length) {
    container.innerHTML = '<div class="empty-state"><div class="empty-icon">📭</div>No workflow runs found.</div>';
    return;
  }
  container.innerHTML = runs.map(r => {
    const conclusion = r.conclusion || r.status || 'pending';
    return `<div class="run-item">
      <div>
        <div class="run-name">${r.name}</div>
        <div class="run-branch" style="color:var(--muted);font-size:.65rem">${r.repoName} · <span class="commit-sha">${r.head_sha?.slice(0,7)}</span></div>
      </div>
      <div class="td muted" style="font-size:.68rem">${r.head_branch}</div>
      <div class="td"><span class="status-badge ${conclusion}"><span class="dot"></span>${conclusion}</span></div>
      <div class="td muted" style="font-size:.68rem">${relativeTime(r.created_at)}</div>
      <div class="td"><a class="action-btn" href="${r.html_url}" target="_blank">View ↗</a></div>
    </div>`;
  }).join('');
}

// ─── REFRESH ALL ─────────────────────────────────────────────────────────────
async function refreshAll() {
  showToast('Refreshing data from GitHub...', 'info');
  await loadRepos();
  await loadWorkflowRuns();
  showToast('Data refreshed! ✓', 'success');
}

// ─── NAV ──────────────────────────────────────────────────────────────────────
function showPage(name) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('page-' + name).classList.add('active');
  const map = ['dashboard','repos','runs','deployments'];
  const idx = map.indexOf(name);
  const btns = document.querySelectorAll('.nav-btn');
  if (idx >= 0 && btns[idx]) btns[idx].classList.add('active');
}

// ─── TOASTS ───────────────────────────────────────────────────────────────────
function showToast(msg, type='info') {
  const c = document.getElementById('toastContainer');
  const t = document.createElement('div');
  t.className = `toast ${type}`;
  t.textContent = msg;
  c.appendChild(t);
  setTimeout(() => t.remove(), 3500);
}

// ─── HELPERS ─────────────────────────────────────────────────────────────────
function relativeTime(iso) {
  const diff = Date.now() - new Date(iso).getTime();
  const m = Math.floor(diff / 60000);
  if (m < 1)  return 'just now';
  if (m < 60) return `${m}m ago`;
  const h = Math.floor(m / 60);
  if (h < 24) return `${h}h ago`;
  return `${Math.floor(h/24)}d ago`;
}
