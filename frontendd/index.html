<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Expense Tracker</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0f14;
      --surface: #161920;
      --surface2: #1e2229;
      --border: #2a2f3a;
      --accent: #e8ff4d;
      --accent2: #4dffb4;
      --danger: #ff4d6d;
      --text: #eef0f5;
      --muted: #6b7280;
      --radius: 12px;
      --font: 'Syne', sans-serif;
      --mono: 'DM Mono', monospace;
    }

    body { font-family: var(--font); background: var(--bg); color: var(--text); min-height: 100vh; }

    /* ── Header ── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 18px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .logo { font-size: 1.3rem; font-weight: 800; letter-spacing: -0.5px; }
    .logo span { color: var(--accent); }
    .header-actions { display: flex; gap: 10px; align-items: center; }

    /* ── Layout ── */
    .container { max-width: 1280px; margin: 0 auto; padding: 28px 24px; }

    /* ── Stats Row ── */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 14px;
      margin-bottom: 28px;
    }
    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      transition: border-color .2s;
    }
    .stat-card:hover { border-color: var(--accent); }
    .stat-label { font-size: .72rem; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
    .stat-value { font-size: 1.6rem; font-weight: 700; font-family: var(--mono); }
    .stat-value.green { color: var(--accent2); }
    .stat-value.yellow { color: var(--accent); }
    .stat-value.red { color: var(--danger); }

    /* ── Two-col layout ── */
    .main-grid {
      display: grid;
      grid-template-columns: 360px 1fr;
      gap: 20px;
      align-items: start;
    }
    @media (max-width: 900px) { .main-grid { grid-template-columns: 1fr; } }

    /* ── Card ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 22px;
      margin-bottom: 20px;
    }
    .card-title {
      font-size: .78rem;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--muted);
      margin-bottom: 16px;
      font-weight: 600;
    }

    /* ── Form ── */
    .form-group { margin-bottom: 12px; }
    label { display: block; font-size: .78rem; color: var(--muted); margin-bottom: 5px; letter-spacing: .5px; }
    input, select, textarea {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: var(--font);
      font-size: .9rem;
      padding: 10px 13px;
      outline: none;
      transition: border-color .2s;
    }
    input:focus, select:focus, textarea:focus { border-color: var(--accent); }
    textarea { resize: vertical; min-height: 64px; }
    select option { background: var(--surface2); }

    /* ── Buttons ── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 10px 18px;
      border-radius: 8px;
      font-family: var(--font);
      font-size: .88rem;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: opacity .15s, transform .1s;
    }
    .btn:active { transform: scale(.97); }
    .btn-primary { background: var(--accent); color: #0d0f14; }
    .btn-primary:hover { opacity: .88; }
    .btn-ghost { background: transparent; color: var(--muted); border: 1px solid var(--border); }
    .btn-ghost:hover { color: var(--text); border-color: var(--text); }
    .btn-danger { background: var(--danger); color: #fff; }
    .btn-danger:hover { opacity: .85; }
    .btn-sm { padding: 6px 11px; font-size: .78rem; border-radius: 6px; }
    .btn-full { width: 100%; justify-content: center; }

    /* ── Filter row ── */
    .filter-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: flex-end;
      margin-bottom: 16px;
    }
    .filter-row .form-group { margin: 0; flex: 1; min-width: 130px; }
    .filter-row input, .filter-row select { padding: 9px 11px; }

    /* ── Expense List ── */
    #expense-list { display: flex; flex-direction: column; gap: 10px; }
    .expense-item {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      transition: border-color .2s;
      animation: fadeIn .25s ease;
    }
    @keyframes fadeIn { from { opacity:0; transform: translateY(6px); } to { opacity:1; transform: none; } }
    .expense-item:hover { background: #1a1f28; }
    .expense-cat-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .expense-info { flex: 1; min-width: 0; }
    .expense-title { font-weight: 600; font-size: .92rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .expense-meta { font-size: .74rem; color: var(--muted); margin-top: 2px; }
    .expense-note { font-size: .74rem; color: var(--muted); font-style: italic; margin-top: 2px; }
    .expense-amount { font-family: var(--mono); font-size: 1rem; font-weight: 500; color: var(--accent); white-space: nowrap; }
    .expense-actions { display: flex; gap: 6px; }

    /* ── Pagination ── */
    .pagination { display: flex; align-items: center; justify-content: center; gap: 8px; margin-top: 18px; flex-wrap: wrap; }
    .page-btn {
      padding: 7px 14px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 7px;
      color: var(--text);
      font-size: .82rem;
      cursor: pointer;
      font-family: var(--font);
      transition: all .15s;
    }
    .page-btn:hover { border-color: var(--accent); color: var(--accent); }
    .page-btn.active { background: var(--accent); color: #0d0f14; border-color: var(--accent); font-weight: 700; }
    .page-btn:disabled { opacity: .3; cursor: default; }

    /* ── Charts ── */
    .chart-tabs { display: flex; gap: 6px; margin-bottom: 16px; }
    .chart-tab {
      padding: 6px 14px;
      border-radius: 6px;
      font-size: .78rem;
      font-weight: 600;
      cursor: pointer;
      color: var(--muted);
      border: 1px solid var(--border);
      background: transparent;
      font-family: var(--font);
      transition: all .2s;
    }
    .chart-tab.active { background: var(--accent); color: #0d0f14; border-color: var(--accent); }
    .chart-wrap { position: relative; height: 240px; }

    /* ── Modal ── */
    .modal-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,.7);
      backdrop-filter: blur(4px);
      z-index: 200;
      align-items: center;
      justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 28px;
      width: 100%;
      max-width: 440px;
      animation: slideUp .2s ease;
    }
    @keyframes slideUp { from { transform: translateY(20px); opacity:0; } to { transform: none; opacity:1; } }
    .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    .modal-title { font-size: 1.1rem; font-weight: 700; }
    .modal-close { background: none; border: none; color: var(--muted); font-size: 1.3rem; cursor: pointer; line-height: 1; }
    .modal-close:hover { color: var(--text); }
    .modal-footer { display: flex; gap: 10px; margin-top: 20px; justify-content: flex-end; }

    /* ── Toast ── */
    #toast-container { position: fixed; bottom: 24px; right: 24px; z-index: 999; display: flex; flex-direction: column; gap: 8px; }
    .toast {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-left: 3px solid var(--accent);
      border-radius: 10px;
      padding: 12px 18px;
      font-size: .85rem;
      max-width: 300px;
      animation: toastIn .25s ease;
      transition: opacity .3s;
    }
    .toast.error { border-left-color: var(--danger); }
    @keyframes toastIn { from { transform: translateX(20px); opacity:0; } to { transform:none; opacity:1; } }

    /* ── Bulk bar ── */
    #bulk-bar {
      display: none;
      background: var(--surface2);
      border: 1px solid var(--accent);
      border-radius: 10px;
      padding: 12px 16px;
      margin-bottom: 14px;
      align-items: center;
      gap: 12px;
    }
    #bulk-bar.visible { display: flex; }
    .bulk-count { font-size: .85rem; font-family: var(--mono); flex: 1; }

    /* ── Empty state ── */
    .empty { text-align: center; padding: 48px 20px; color: var(--muted); }
    .empty-icon { font-size: 2.5rem; margin-bottom: 12px; }
    .empty p { font-size: .9rem; }

    /* ── Category manager ── */
    .cat-list { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
    .cat-chip {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 5px 10px;
      border-radius: 20px;
      font-size: .78rem;
      font-weight: 600;
      color: #0d0f14;
      cursor: default;
    }
    .cat-chip .del-cat { background: none; border: none; cursor: pointer; color: #0d0f14; opacity: .6; font-size: .9rem; line-height:1; }
    .cat-chip .del-cat:hover { opacity: 1; }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    /* ── Sort/search row ── */
    .search-sort { display: flex; gap: 8px; margin-bottom: 14px; }
    .search-sort input { flex: 1; }
    .search-sort select { width: auto; flex-shrink: 0; }

    /* ── Filter results ── */
    .filter-result-item {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 14px;
      display: flex;
      justify-content: space-between;
      font-size: .85rem;
      margin-bottom: 6px;
    }
    .filter-summary {
      margin-bottom: 10px;
      font-size: .82rem;
      color: var(--muted);
      font-family: var(--mono);
    }

    /* ── Config banner ── */
    #config-banner {
      background: #2a1a00;
      border: 1px solid #ff9f43;
      border-radius: 10px;
      padding: 14px 18px;
      margin: 16px 24px;
      font-size: .85rem;
      color: #ff9f43;
      display: none;
      align-items: center;
      gap: 12px;
    }
    #config-banner.show { display: flex; }
    #config-banner input {
      flex: 1;
      background: #1a1000;
      border-color: #ff9f43;
      color: #ff9f43;
      font-family: var(--mono);
      font-size: .82rem;
    }
    #config-banner input::placeholder { color: #7a5020; }
  </style>
</head>
<body>

<!-- ── Config Banner (shown when BASE_URL is not set) ── -->
<div id="config-banner">
  <span>⚙️ Enter your Render backend URL:</span>
  <input id="backend-url-input" type="url" placeholder="https://your-service-name.onrender.com" />
  <button class="btn btn-primary btn-sm" onclick="saveBackendUrl()">Save &amp; Reload</button>
</div>

<!-- Header -->
<header>
  <div class="logo">💸 <span>Xpense</span>Tracker</div>
  <div class="header-actions">
    <button class="btn btn-ghost btn-sm" onclick="exportCSV()">⬇ Export CSV</button>
    <button class="btn btn-ghost btn-sm" onclick="openCatModal()">🏷 Categories</button>
    <button class="btn btn-primary btn-sm" onclick="openAddModal()">+ Add Expense</button>
  </div>
</header>

<div class="container">

  <!-- Stats -->
  <div class="stats-grid">
    <div class="stat-card"><div class="stat-label">Total Spent</div><div class="stat-value yellow" id="stat-total">—</div></div>
    <div class="stat-card"><div class="stat-label">Transactions</div><div class="stat-value" id="stat-count">—</div></div>
    <div class="stat-card"><div class="stat-label">Average</div><div class="stat-value green" id="stat-avg">—</div></div>
    <div class="stat-card"><div class="stat-label">Highest</div><div class="stat-value red" id="stat-max">—</div></div>
    <div class="stat-card"><div class="stat-label">Lowest</div><div class="stat-value green" id="stat-min">—</div></div>
  </div>

  <div class="main-grid">

    <!-- LEFT: Charts + Date Filter -->
    <div>
      <div class="card">
        <div class="card-title">Analytics</div>
        <div class="chart-tabs">
          <button class="chart-tab active" onclick="switchChart('daily', this)">Daily</button>
          <button class="chart-tab" onclick="switchChart('monthly', this)">Monthly</button>
          <button class="chart-tab" onclick="switchChart('category', this)">By Category</button>
        </div>
        <div class="chart-wrap"><canvas id="mainChart"></canvas></div>
      </div>

      <!-- Date Filter -->
      <div class="card">
        <div class="card-title">Filter by Date</div>
        <div class="filter-row">
          <div class="form-group"><label>From</label><input type="date" id="filter-start"/></div>
          <div class="form-group"><label>To</label><input type="date" id="filter-end"/></div>
        </div>
        <div style="display:flex;gap:8px">
          <button class="btn btn-primary btn-sm" onclick="filterByDate()">Apply Filter</button>
          <button class="btn btn-ghost btn-sm" onclick="clearFilter()">Clear</button>
        </div>
        <div id="filter-results" style="margin-top:14px"></div>
      </div>
    </div>

    <!-- RIGHT: Expense List -->
    <div>
      <div class="card">
        <div class="card-title">Expenses</div>

        <!-- Search & Sort -->
        <div class="search-sort">
          <input id="search-input" placeholder="🔍 Search title or note…" oninput="debounceSearch()" />
          <select id="cat-filter" onchange="loadExpenses(1)">
            <option value="">All Categories</option>
          </select>
          <select id="sort-select" onchange="loadExpenses(1)">
            <option value="id">Newest</option>
            <option value="amount">Amount</option>
            <option value="title">Title</option>
          </select>
        </div>

        <!-- Bulk delete bar -->
        <div id="bulk-bar">
          <span class="bulk-count"><span id="selected-count">0</span> selected</span>
          <button class="btn btn-danger btn-sm" onclick="bulkDelete()">🗑 Delete Selected</button>
          <button class="btn btn-ghost btn-sm" onclick="clearSelection()">✕ Cancel</button>
        </div>

        <div id="expense-list"></div>
        <div id="pagination"></div>
      </div>
    </div>

  </div>
</div>

<!-- ── Add / Edit Modal ── -->
<div class="modal-overlay" id="expense-modal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modal-title">Add Expense</div>
      <button class="modal-close" onclick="closeModal('expense-modal')">✕</button>
    </div>
    <div class="form-group">
      <label>Title *</label>
      <input id="m-title" placeholder="e.g. Grocery shopping"/>
    </div>
    <div class="form-group">
      <label>Amount (₹) *</label>
      <input id="m-amount" type="number" min="0.01" step="0.01" placeholder="0.00"/>
    </div>
    <div class="form-group">
      <label>Category</label>
      <select id="m-category">
  <option value="General">General</option>
</select>
    </div>
    <div class="form-group">
      <label>Note</label>
      <textarea id="m-note" placeholder="Optional note…"></textarea>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('expense-modal')">Cancel</button>
      <button class="btn btn-primary" id="modal-save-btn" onclick="saveExpense()">Save</button>
    </div>
  </div>
</div>

<!-- ── Category Modal ── -->
<div class="modal-overlay" id="cat-modal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">Manage Categories</div>
      <button class="modal-close" onclick="closeModal('cat-modal')">✕</button>
    </div>
    <div style="display:flex;gap:8px;margin-bottom:14px">
      <input id="new-cat-name" placeholder="Category name" style="flex:1"/>
      <input id="new-cat-color" type="color" value="#6366f1" style="width:44px;padding:4px;cursor:pointer"/>
      <button class="btn btn-primary btn-sm" onclick="addCategory()">Add</button>
    </div>
    <div class="cat-list" id="cat-list"></div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('cat-modal')">Close</button>
    </div>
  </div>
</div>

<!-- ── Toast container ── -->
<div id="toast-container"></div>

<script>
/* ───────────────────────────────────────────────────────
   BASE URL RESOLUTION
─────────────────────────────────────────────────────── */

function getBaseUrl() {
  return (
    localStorage.getItem("backendUrl") ||
    (typeof window.BACKEND_URL !== "undefined" ? window.BACKEND_URL : null) ||
    ""
  );
}

var BASE_URL = getBaseUrl();

// Show the config banner if no backend URL is configured
if (!BASE_URL) {
  document.getElementById("config-banner").classList.add("show");
}

function saveBackendUrl() {
  var val = document.getElementById("backend-url-input").value.trim().replace(/\/$/, "");
  if (!val || !val.startsWith("http")) {
    alert("Please enter a valid URL starting with https://");
    return;
  }
  localStorage.setItem("backendUrl", val);
  location.reload();
}

/* ───────────────── STATE ───────────────── */

var token        = localStorage.getItem("token");
var currentUser  = localStorage.getItem("user");
var mainChart    = null;
var currentPage  = 1;
var currentChartType = "daily";
var editingId    = null;
var categories   = [];
var selectedIds  = new Set();
var searchTimer  = null;

/* ───────────────── AUTH SCREEN ───────────────── */

if (!token) {
  document.body.innerHTML = `
    <div id="config-banner" style="background:#2a1a00;border:1px solid #ff9f43;border-radius:10px;padding:14px 18px;margin:16px 24px;font-size:.85rem;color:#ff9f43;display:${BASE_URL ? 'none' : 'flex'};align-items:center;gap:12px;">
      <span>⚙️ Enter your Render backend URL:</span>
      <input id="backend-url-input" type="url" placeholder="https://your-service-name.onrender.com"
        style="flex:1;background:#1a1000;border:1px solid #ff9f43;color:#ff9f43;font-family:monospace;font-size:.82rem;padding:8px 12px;border-radius:8px;outline:none;" />
      <button onclick="saveBackendUrl()" style="padding:8px 14px;background:#e8ff4d;border:none;border-radius:6px;font-weight:700;cursor:pointer;font-family:inherit;">Save &amp; Reload</button>
    </div>
    <div style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:#0d0f14;color:white;font-family:'Syne',sans-serif;">
      <div style="width:100%;max-width:400px;background:#161920;padding:30px;border-radius:16px;border:1px solid #2a2f3a;">
        <h2 style="margin-bottom:6px;font-size:1.4rem;">💸 XpenseTracker</h2>
        <p style="color:#6b7280;font-size:.85rem;margin-bottom:24px;">Track every rupee, every day.</p>

        <div id="auth-fields">
          <input id="auth-name" placeholder="Your name"
            style="width:100%;padding:12px;margin-bottom:10px;background:#1e2229;border:1px solid #2a2f3a;color:white;border-radius:8px;font-family:inherit;outline:none;"/>
        </div>

        <input id="auth-email" placeholder="Email address" type="email"
          style="width:100%;padding:12px;margin-bottom:10px;background:#1e2229;border:1px solid #2a2f3a;color:white;border-radius:8px;font-family:inherit;outline:none;"/>

        <input id="auth-password" placeholder="Password" type="password"
          style="width:100%;padding:12px;margin-bottom:16px;background:#1e2229;border:1px solid #2a2f3a;color:white;border-radius:8px;font-family:inherit;outline:none;"/>

        <div style="display:flex;gap:10px;margin-bottom:12px;">
          <button id="btn-register" onclick="register()" style="flex:1;padding:12px;border:none;border-radius:8px;background:#e8ff4d;font-weight:700;cursor:pointer;font-family:inherit;">Register</button>
          <button id="btn-login" onclick="login()" style="flex:1;padding:12px;border:none;border-radius:8px;background:#4dffb4;font-weight:700;cursor:pointer;font-family:inherit;">Login</button>
        </div>

        <p style="font-size:.8rem;color:#6b7280;text-align:center;">
          Already have an account? Click <strong style="color:#4dffb4;cursor:pointer" onclick="toggleAuthMode()">Login</strong>
        </p>

        <p id="auth-msg" style="margin-top:12px;color:#ff4d6d;font-size:.85rem;text-align:center;"></p>
      </div>
    </div>
  `;

  var loginMode = false;
  window.toggleAuthMode = function() {
    loginMode = !loginMode;
    var nameField = document.getElementById("auth-fields");
    if (nameField) nameField.style.display = loginMode ? "none" : "block";
  };
}

/* ───────────────── API HELPER ───────────────── */

async function api(url, options) {
  options = options || {};
  if (!BASE_URL) {
    toast("Backend URL not configured. Please set it in the banner above.", "error");
    throw new Error("BASE_URL not set");
  }

  options.headers = Object.assign(
    { "Content-Type": "application/json" },
    options.headers || {}
  );
  if (token) options.headers.Authorization = "Bearer " + token;

  var res = await fetch(BASE_URL + url, options);

  if (res.status === 401) {
    logout();
    throw new Error("Unauthorized");
  }
  return res;
}

/* ───────────────── AUTH FUNCTIONS ───────────────── */

async function register() {
  var nameEl   = document.getElementById("auth-name");
  var name     = nameEl ? nameEl.value.trim() : "";
  var email    = document.getElementById("auth-email").value.trim();
  var password = document.getElementById("auth-password").value.trim();
  var msgEl    = document.getElementById("auth-msg");

  if (!BASE_URL) { msgEl.textContent = "Please set your backend URL first (banner above)."; return; }
  if (!name)     { msgEl.textContent = "Please enter your name."; return; }
  if (!email)    { msgEl.textContent = "Please enter an email."; return; }
  if (!password) { msgEl.textContent = "Please enter a password."; return; }

  try {
    var res = await fetch(BASE_URL + "/register", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ name: name, email: email, password: password })
    });
    var data = await res.json();

    if (!res.ok) { msgEl.textContent = data.error || "Registration failed."; return; }

    localStorage.setItem("token", data.token);
    localStorage.setItem("user", JSON.stringify(data.user));
    location.reload();
  } catch (e) {
    document.getElementById("auth-msg").textContent = "Network error. Check your backend URL and server status.";
  }
}

async function login() {
  var email    = document.getElementById("auth-email").value.trim();
  var password = document.getElementById("auth-password").value.trim();
  var msgEl    = document.getElementById("auth-msg");

  if (!BASE_URL) { msgEl.textContent = "Please set your backend URL first (banner above)."; return; }
  if (!email)    { msgEl.textContent = "Please enter an email."; return; }
  if (!password) { msgEl.textContent = "Please enter a password."; return; }

  try {
    var res = await fetch(BASE_URL + "/login", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ email: email, password: password })
    });
    var data = await res.json();

    if (!res.ok) { msgEl.textContent = data.error || "Login failed."; return; }

    localStorage.setItem("token", data.token);
    localStorage.setItem("user", JSON.stringify(data.user));
    location.reload();
  } catch (e) {
    document.getElementById("auth-msg").textContent = "Network error. Check your backend URL and server status.";
  }
}

function logout() {
  localStorage.removeItem("token");
  localStorage.removeItem("user");
  location.reload();
}

/* ───────────────── HEADER USER ───────────────── */

if (token) {
  var user   = JSON.parse(currentUser || "{}");
  var header = document.querySelector(".header-actions");
  if (header) {
    header.innerHTML =
      '<span style="color:var(--accent);font-size:.9rem;">👋 ' + escHtml(user.name || "User") + '</span>' +
      '<button class="btn btn-ghost btn-sm" onclick="exportCSV()">⬇ Export CSV</button>' +
      '<button class="btn btn-ghost btn-sm" onclick="openCatModal()">🏷 Categories</button>' +
      '<button class="btn btn-primary btn-sm" onclick="openAddModal()">+ Add Expense</button>' +
      '<button class="btn btn-ghost btn-sm" onclick="changeBackendUrl()" title="Change backend URL">⚙️</button>' +
      '<button class="btn btn-danger btn-sm" onclick="logout()">Logout</button>';
  }
}

function changeBackendUrl() {
  localStorage.removeItem("backendUrl");
  location.reload();
}

/* ───────────────── INIT ───────────────── */

async function init() {
  if (!token) return;
  try {
    await Promise.all([loadCategories(), loadSummary()]);
    await loadExpenses(1);
    await loadChart("daily");
  } catch (err) {
    console.error("Init error:", err);
    toast("Failed to load data. Check your backend URL and server status.", "error");
  }
}

/* ───────────────── TOAST ───────────────── */

function toast(msg, type) {
  type = type || "success";
  var el = document.createElement("div");
  el.className = "toast" + (type === "error" ? " error" : "");
  el.textContent = msg;
  var container = document.getElementById("toast-container");
  if (container) container.appendChild(el);
  setTimeout(function() {
    el.style.opacity = "0";
    setTimeout(function() { el.remove(); }, 300);
  }, 3000);
}

/* ───────────────── FORMAT HELPERS ───────────────── */

function fmt(n) {
  return Number(n || 0).toLocaleString("en-IN", { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

function escHtml(s) {
  return String(s || "")
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;");
}

function fmtDate(iso) {
  if (!iso) return "";
  return new Date(iso).toLocaleDateString("en-IN", { day: "numeric", month: "short", year: "numeric" });
}

/* ───────────────── SUMMARY ───────────────── */

async function loadSummary() {
  var res = await api("/summary");
  var d   = await res.json();
  document.getElementById("stat-total").textContent = "₹" + fmt(d.total);
  document.getElementById("stat-count").textContent = d.count;
  document.getElementById("stat-avg").textContent   = "₹" + fmt(d.average);
  document.getElementById("stat-max").textContent   = "₹" + fmt(d.max);
  document.getElementById("stat-min").textContent   = "₹" + fmt(d.min);
}

/* ───────────────── CATEGORIES ───────────────── */

async function loadCategories() {

  try {

    const res = await api("/categories");

    if (!res.ok) {
      toast("Failed to load categories", "error");
      return;
    }

    categories = await res.json();

    console.log("Loaded categories:", categories);

    populateCategorySelects();

    renderCatList();

  } catch (err) {

    console.error("Category Load Error:", err);

    toast("Could not load categories", "error");
  }
}

function getCatColor(name) {

  const cat = categories.find(c => c.name === name);

  return cat ? cat.color : "#6366f1";
}

function populateCategorySelects() {

  const modalSelect = document.getElementById("m-category");

  const filterSelect = document.getElementById("cat-filter");

  if (modalSelect) {

    modalSelect.innerHTML = "";

    categories.forEach(cat => {

      const option = document.createElement("option");

      option.value = cat.name;

      option.textContent = cat.name;

      modalSelect.appendChild(option);
    });
  }

  if (filterSelect) {

    filterSelect.innerHTML =
      '<option value="">All Categories</option>';

    categories.forEach(cat => {

      const option = document.createElement("option");

      option.value = cat.name;

      option.textContent = cat.name;

      filterSelect.appendChild(option);
    });
  }
}

function renderCatList() {

  const el = document.getElementById("cat-list");

  if (!el) return;

  if (!categories.length) {

    el.innerHTML =
      '<p style="color:var(--muted);font-size:.85rem;">No categories yet.</p>';

    return;
  }

  el.innerHTML = categories.map(c => `
    <span class="cat-chip" style="background:${c.color}">
      ${escHtml(c.name)}
      <button
        class="del-cat"
        onclick="deleteCategory(${c.id})"
        title="Delete"
      >
        ✕
      </button>
    </span>
  `).join("");
}

function openCatModal() {

  renderCatList();

  openModal("cat-modal");
}

async function addCategory() {

  const name =
    document.getElementById("new-cat-name").value.trim();

  const color =
    document.getElementById("new-cat-color").value;

  if (!name) {

    toast("Please enter category name", "error");

    return;
  }

  try {

    const res = await api("/categories", {
      method: "POST",
      body: JSON.stringify({
        name,
        color
      })
    });

    const data = await res.json();

    if (!res.ok) {

      toast(data.error || "Failed", "error");

      return;
    }

    document.getElementById("new-cat-name").value = "";

    await loadCategories();

    toast("Category added");

  } catch (err) {

    console.error(err);

    toast("Error adding category", "error");
  }
}

async function deleteCategory(id) {

  if (!confirm("Delete this category?")) return;

  try {

    const res = await api("/categories/" + id, {
      method: "DELETE"
    });

    if (!res.ok) {

      toast("Delete failed", "error");

      return;
    }

    await loadCategories();

    toast("Category deleted");

  } catch (err) {

    console.error(err);

    toast("Delete error", "error");
  }
}

/* ───────────────── LOAD EXPENSES ───────────────── */

async function loadExpenses(page) {
  page = page || 1;
  currentPage = page;

  var search   = document.getElementById("search-input").value;
  var category = document.getElementById("cat-filter").value;
  var sort     = document.getElementById("sort-select").value;

  var params = new URLSearchParams({ page: page, limit: 15, sort: sort });
  if (search)   params.set("search",   search);
  if (category) params.set("category", category);

  try {
    var res = await api("/expenses?" + params.toString());
    var d   = await res.json();
    renderExpenses(d.data || []);
    renderPagination(d.pagination || { page: 1, totalPages: 1 });
  } catch (err) {
    console.error(err);
    toast("Failed to load expenses", "error");
  }
}

/* ───────────────── RENDER EXPENSES ───────────────── */

function renderExpenses(data) {
  var list = document.getElementById("expense-list");
  if (!list) return;

  if (!data || !data.length) {
    list.innerHTML =
      '<div class="empty">' +
      '<div class="empty-icon">🧾</div>' +
      '<p>No expenses found.<br>Add your first one!</p>' +
      '</div>';
    return;
  }

  list.innerHTML = data.map(function(exp) {
    var color    = getCatColor(exp.category);
    var checked  = selectedIds.has(exp.id) ? "checked" : "";
    var noteHtml = exp.note
      ? '<div class="expense-note">' + escHtml(exp.note) + '</div>'
      : "";

    return '<div class="expense-item" id="exp-' + exp.id + '">' +
      '<input type="checkbox" ' + checked +
      ' style="accent-color:var(--accent);width:15px;height:15px;cursor:pointer;flex-shrink:0;"' +
      ' onchange="toggleSelect(' + exp.id + ', this.checked)"/>' +
      '<div class="expense-cat-dot" style="background:' + color + '"></div>' +
      '<div class="expense-info">' +
        '<div class="expense-title">' + escHtml(exp.title) + '</div>' +
        '<div class="expense-meta">' + escHtml(exp.category) + ' · ' + fmtDate(exp.created_at) + '</div>' +
        noteHtml +
      '</div>' +
      '<div class="expense-amount">₹' + fmt(exp.amount) + '</div>' +
      '<div class="expense-actions">' +
        '<button class="btn btn-ghost btn-sm" onclick="openEditModal(' + exp.id + ')" title="Edit">✏</button>' +
        '<button class="btn btn-danger btn-sm" onclick="deleteExpense(' + exp.id + ')" title="Delete">🗑</button>' +
      '</div>' +
      '</div>';
  }).join("");
}

/* ───────────────── BULK SELECT ───────────────── */

function toggleSelect(id, checked) {
  if (checked) selectedIds.add(id);
  else         selectedIds.delete(id);
  updateBulkBar();
}

function updateBulkBar() {
  var bar = document.getElementById("bulk-bar");
  var cnt = document.getElementById("selected-count");
  if (!bar || !cnt) return;
  if (selectedIds.size > 0) {
    bar.classList.add("visible");
    cnt.textContent = selectedIds.size;
  } else {
    bar.classList.remove("visible");
  }
}

function clearSelection() {
  selectedIds.clear();
  updateBulkBar();
  document.querySelectorAll("#expense-list input[type=checkbox]")
    .forEach(function(cb) { cb.checked = false; });
}

async function bulkDelete() {
  if (!selectedIds.size) return;
  var count = selectedIds.size;
  if (!confirm("Delete " + count + " expense(s)?")) return;

  try {
    var res = await api("/bulk-delete", {
      method: "POST",
      body: JSON.stringify({ ids: Array.from(selectedIds) })
    });
    if (!res.ok) { toast("Bulk delete failed", "error"); return; }
    selectedIds.clear();
    updateBulkBar();
    toast("Deleted " + count + " expense(s)");
    await refreshAll();
  } catch (err) {
    console.error(err);
    toast("Error deleting expenses", "error");
  }
}

/* ───────────────── PAGINATION ───────────────── */

function renderPagination(p) {
  var el = document.getElementById("pagination");
  if (!el) return;
  if (!p || p.totalPages <= 1) { el.innerHTML = ""; return; }

  var html = '<div class="pagination">';
  for (var i = 1; i <= p.totalPages; i++) {
    html += '<button class="page-btn ' + (i === p.page ? "active" : "") + '" onclick="loadExpenses(' + i + ')">' + i + '</button>';
  }
  html += '</div>';
  el.innerHTML = html;
}

/* ───────────────── SAVE EXPENSE ───────────────── */

async function saveExpense() {
  var title    = document.getElementById("m-title").value.trim();
  var amount   = document.getElementById("m-amount").value.trim();
  var category = document.getElementById("m-category").value;
  var note     = document.getElementById("m-note").value.trim();

  if (!title) {
    toast("Please enter a title.", "error");
    document.getElementById("m-title").focus();
    return;
  }
  if (!amount || isNaN(amount) || Number(amount) <= 0) {
    toast("Please enter a valid amount greater than 0.", "error");
    document.getElementById("m-amount").focus();
    return;
  }

  var saveBtn = document.getElementById("modal-save-btn");
  saveBtn.textContent = "Saving…";
  saveBtn.disabled    = true;

  try {
    var url    = editingId ? "/update-expense/" + editingId : "/add-expense";
    var method = editingId ? "PUT" : "POST";

    var res = await api(url, {
      method: method,
      body: JSON.stringify({ title: title, amount: Number(amount), category: category, note: note })
    });

    var d = await res.json();

    if (!res.ok) {
      toast(d.error || "Failed to save expense.", "error");
      return;
    }

    closeModal("expense-modal");
    toast(editingId ? "Expense updated ✓" : "Expense added ✓");
    await refreshAll();
  } catch (err) {
    console.error(err);
    toast("Network error while saving.", "error");
  } finally {
    saveBtn.textContent = "Save";
    saveBtn.disabled    = false;
  }
}

/* ───────────────── DELETE EXPENSE ───────────────── */

async function deleteExpense(id) {
  if (!confirm("Delete this expense?")) return;

  try {
    var res = await api("/delete-expense/" + id, { method: "DELETE" });
    if (!res.ok) { toast("Failed to delete", "error"); return; }
    toast("Expense deleted");
    await refreshAll();
  } catch (err) {
    console.error(err);
    toast("Error deleting expense", "error");
  }
}

/* ───────────────── EDIT MODAL ───────────────── */

async function openEditModal(id) {
  try {
    var res = await api("/expenses/" + id);
    if (!res.ok) { toast("Could not load expense", "error"); return; }
    var exp = await res.json();

    editingId = id;
    document.getElementById("modal-title").textContent = "Edit Expense";
    document.getElementById("m-title").value           = exp.title  || "";
    document.getElementById("m-amount").value          = exp.amount || "";
    document.getElementById("m-note").value            = exp.note   || "";

    await loadCategories();
    document.getElementById("m-category").value = exp.category || "";

    openModal("expense-modal");
  } catch (err) {
    console.error(err);
    toast("Error loading expense", "error");
  }
}

/* ───────────────── ADD MODAL ───────────────── */

function openAddModal() {
  editingId = null;
  document.getElementById("modal-title").textContent = "Add Expense";
  document.getElementById("m-title").value           = "";
  document.getElementById("m-amount").value          = "";
  document.getElementById("m-note").value            = "";
  var catSel = document.getElementById("m-category");
  if (catSel && catSel.options.length) catSel.selectedIndex = 0;
  openModal("expense-modal");
}

/* ───────────────── MODALS ───────────────── */

function openModal(id) {
  var el = document.getElementById(id);
  if (el) el.classList.add("open");
}

function closeModal(id) {
  var el = document.getElementById(id);
  if (el) el.classList.remove("open");
}

// Only attach modal/keyboard listeners when logged in (DOM has the overlays)
if (token) {
  document.querySelectorAll(".modal-overlay").forEach(function(overlay) {
    overlay.addEventListener("click", function(e) {
      if (e.target === this) closeModal(this.id);
    });
  });

  document.addEventListener("keydown", function(e) {
    if (e.key === "Escape") {
      document.querySelectorAll(".modal-overlay.open")
        .forEach(function(m) { closeModal(m.id); });
    }
  });
}

/* ───────────────── REFRESH ALL ───────────────── */

async function refreshAll() {
  await Promise.all([
    loadSummary(),
    loadExpenses(currentPage),
    loadChart(currentChartType)
  ]);
}

/* ───────────────── CHARTS ───────────────── */

var CHART_COLORS = [
  "#e8ff4d","#4dffb4","#ff4d6d","#4d9fff","#ff9f4d",
  "#b44dff","#4dfff0","#ff4db3","#a0ff4d","#4d6fff"
];

async function loadChart(type) {
  currentChartType = type;

  var endpointMap = {
    daily:    "/chart-data",
    monthly:  "/chart-data/monthly",
    category: "/chart-data/category"
  };

  try {
    var res  = await api(endpointMap[type] || "/chart-data");
    var data = await res.json();

    if (mainChart) { mainChart.destroy(); mainChart = null; }

    var ctx = document.getElementById("mainChart").getContext("2d");
    if (!ctx) return;

    var baseOptions = {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { display: type === "category", labels: { color: "#eef0f5", font: { family: "'DM Mono'" } } },
        tooltip: { backgroundColor: "#1e2229", titleColor: "#e8ff4d", bodyColor: "#eef0f5", borderColor: "#2a2f3a", borderWidth: 1 }
      }
    };

    if (type === "category") {
      mainChart = new Chart(ctx, {
        type: "doughnut",
        data: {
          labels: data.map(function(x) { return x.category; }),
          datasets: [{
            data:            data.map(function(x) { return Number(x.total); }),
            backgroundColor: data.map(function(_, i) { return CHART_COLORS[i % CHART_COLORS.length]; }),
            borderColor:     "#0d0f14",
            borderWidth:     2
          }]
        },
        options: Object.assign({}, baseOptions, { cutout: "60%" })
      });
      return;
    }

    mainChart = new Chart(ctx, {
      type: "bar",
      data: {
        labels: data.map(function(x) { return x.date || x.month; }),
        datasets: [{
          label: type === "monthly" ? "Monthly Spend" : "Daily Spend",
          data:            data.map(function(x) { return Number(x.total); }),
          backgroundColor: "#e8ff4d33",
          borderColor:     "#e8ff4d",
          borderWidth:     2,
          borderRadius:    4
        }]
      },
      options: Object.assign({}, baseOptions, {
        scales: {
          x: { ticks: { color: "#6b7280", maxRotation: 45 }, grid: { color: "#2a2f3a" } },
          y: { ticks: { color: "#6b7280" }, grid: { color: "#2a2f3a" } }
        }
      })
    });
  } catch (err) {
    console.error("Chart error:", err);
  }
}

function switchChart(type, btn) {
  document.querySelectorAll(".chart-tab").forEach(function(x) { x.classList.remove("active"); });
  btn.classList.add("active");
  loadChart(type);
}

/* ───────────────── DATE FILTER ───────────────── */

async function filterByDate() {
  var start = document.getElementById("filter-start").value;
  var end   = document.getElementById("filter-end").value;
  var el    = document.getElementById("filter-results");

  if (!start || !end) {
    toast("Please select both start and end dates.", "error");
    return;
  }
  if (start > end) {
    toast("Start date must be before end date.", "error");
    return;
  }

  try {
    var res  = await api("/expenses/filter/date?start=" + start + "&end=" + end);
    var data = await res.json();

    if (!data.length) {
      el.innerHTML = '<p style="color:var(--muted);font-size:.85rem;">No expenses in this range.</p>';
      return;
    }

    var total = data.reduce(function(s, e) { return s + Number(e.amount); }, 0);

    el.innerHTML =
      '<div class="filter-summary">' + data.length + ' expense(s) · Total: ₹' + fmt(total) + '</div>' +
      data.map(function(exp) {
        return '<div class="filter-result-item">' +
          '<span>' + escHtml(exp.title) + ' <span style="color:var(--muted);font-size:.75rem;">' + escHtml(exp.category) + '</span></span>' +
          '<span style="color:var(--accent);font-family:var(--mono);">₹' + fmt(exp.amount) + '</span>' +
          '</div>';
      }).join("");
  } catch (err) {
    console.error(err);
    toast("Error fetching filtered results", "error");
  }
}

function clearFilter() {
  document.getElementById("filter-start").value = "";
  document.getElementById("filter-end").value   = "";
  document.getElementById("filter-results").innerHTML = "";
}

/* ───────────────── EXPORT CSV ───────────────── */

function exportCSV() {
  if (!token) { toast("Please log in first", "error"); return; }
  api("/export/csv").then(function(res) {
    if (!res.ok) { toast("Export failed", "error"); return null; }
    return res.blob();
  }).then(function(blob) {
    if (!blob) return;
    var url = URL.createObjectURL(blob);
    var a   = document.createElement("a");
    a.href     = url;
    a.download = "expenses.csv";
    a.click();
    URL.revokeObjectURL(url);
  }).catch(function() { toast("Export failed", "error"); });
}

/* ───────────────── SEARCH DEBOUNCE ───────────────── */

function debounceSearch() {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(function() { loadExpenses(1); }, 400);
}

/* ───────────────── KICK OFF ───────────────── */

if (token && BASE_URL) {
  init();
}
