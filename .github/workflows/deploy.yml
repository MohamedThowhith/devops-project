name: Full CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-test-deploy:
    runs-on: ubuntu-latest

    # ✅ Add PostgreSQL service (IMPORTANT)
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: testdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U test"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      # 1️⃣ Checkout
      - name: Checkout code
        uses: actions/checkout@v3

      # 2️⃣ Setup Node
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      # 3️⃣ Install dependencies
      - name: Install dependencies
        run: npm install

      # 4️⃣ Wait for DB to be ready
      - name: Wait for PostgreSQL
        run: |
          for i in {1..10}; do
            nc -z localhost 5432 && echo "Postgres is up!" && exit 0
            echo "Waiting for Postgres..."
            sleep 2
          done
          echo "Postgres failed to start" && exit 1

      # 5️⃣ Start backend
      - name: Start server
        env:
          PORT: 3000
          NODE_ENV: test
          DATABASE_URL: postgres://test:test@localhost:5432/testdb
        run: |
          node index.js &
          sleep 5

      # 6️⃣ Test API (health)
      - name: Test health API
        run: curl --fail http://localhost:3000/health

      # 7️⃣ Test main API
      - name: Test expenses API
        run: curl --fail http://localhost:3000/api/expenses

      # 8️⃣ Build Docker image
      - name: Build Docker image
        run: docker build -t expense-tracker .

      # 9️⃣ Deploy Backend (Render)
      - name: Deploy Backend (Render)
        run: curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK }}

      # 🔟 Deploy Frontend (Vercel)
      - name: Deploy Frontend (Vercel)
        run: curl -X POST ${{ secrets.VERCEL_DEPLOY_HOOK }}