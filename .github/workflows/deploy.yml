name: CI/CD Pipeline

on:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-test-deploy:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: testdb
        ports:
          - 5432:5432

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install deps
        run: npm install

      # ✅ Start server with logs visible
      - name: Start server
        env:
          PORT: 3000
          NODE_ENV: test
          DATABASE_URL: postgres://test:test@localhost:5432/testdb
        run: |
          node index.js > server.log 2>&1 &
          sleep 5
          cat server.log

      # ✅ Debug: check if server is running
      - name: Debug server response
        run: |
          curl -v http://localhost:3000/health || true

      # ✅ Real test
      - name: Test health
        run: curl --fail http://localhost:3000/health

      # Deploy only if tests pass
      - name: Deploy Backend
        run: curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK }}

      - name: Deploy Frontend
        run: curl -X POST ${{ secrets.VERCEL_DEPLOY_HOOK }}