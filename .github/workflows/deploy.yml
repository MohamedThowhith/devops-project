name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Build Docker
        run: docker build -t app .

      - name: Run Container
        run: docker run -d -p 3000:3000 app

      - name: Wait for app
        run: sleep 10

      - name: Test API
        run: curl http://localhost:3000/health